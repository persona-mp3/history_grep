name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]
    types: [ opened, synchronize ]

permissions:
  contents: write


jobs:
  test-rust:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Running Rust tests
        run: cargo test
        working_dir: rust_impl
